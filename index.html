<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahananda Specialized Test Calculator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #f8fafc;
  --bg2: #f1f5f9;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --emerald: #6366f1;
  --emerald-mid: #818cf8;
  --emerald-light: #c7d2fe;
  --emerald-glow: rgba(99, 102, 241, 0.15);
  --emerald-border: rgba(99, 102, 241, 0.2);
  --rose: #e11d48;
  --rose-bg: #fff1f2;
  --ink: #0f172a;
  --ink2: #334155;
  --ink3: #64748b;
  --ink4: #94a3b8;
  --border: #e2e8f0;
  --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
  --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  --radius: 16px;
  --radius-sm: 10px;
}

body{ font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; line-height: 1.5; }

.topbar{ position:sticky; top:0; z-index:200; background:rgba(255,255,255,0.9); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; justify-content:center; }
.topbar-brand{ display:flex; align-items:center; gap:10px; font-weight:900; font-size:22px; color:var(--ink); text-align: center; }
.topbar-brand span { color: var(--emerald); }

.wrap{ max-width:1000px; margin:0 auto; padding:20px; min-height: calc(100vh - 180px); }

.top-row { display: grid; grid-template-columns: 240px 1fr; gap: 16px; margin-bottom: 24px; }

.stat-pill{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:15px 20px; display:flex; align-items:center; gap:15px; box-shadow:var(--card-shadow); }
.stat-icon{ width:44px; height:44px; border-radius:12px; background:var(--emerald-glow); display:flex; align-items:center; justify-content:center; font-size:22px; }
.stat-val{ font-size:26px; font-weight:800; line-height:1; }
.stat-lbl{ font-size:11px; color:var(--ink4); text-transform:uppercase; font-weight:700; margin-top:2px; }

.tabs-wrapper{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:6px; display:flex; gap:6px; box-shadow:var(--card-shadow); }
.tab-btn{ flex:1; padding:12px; border:none; background:transparent; color:var(--ink3); font-weight:700; font-size:15px; border-radius:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:0.2s; }
.tab-btn.active{ background:var(--accent-gradient); color:#fff; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }

.card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:20px; box-shadow:var(--card-shadow); }

/* Search Field */
.srch-wrap{ position:relative; }
.srch-field{ width:100%; background:var(--surface2); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:15px 20px 15px 50px; color:var(--ink); font-size:16px; outline:none; transition: 0.2s; }
.srch-field:focus{ border-color:var(--emerald); background:var(--surface); }
.srch-icon-abs { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--ink4); }

.drop{ position:absolute; top:100%; left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index:500; display:none; max-height:400px; overflow-y:auto; margin-top:8px; }
.drop.open{ display:block; }

.d-item{ padding:14px 20px; cursor:pointer; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap: 15px; }
.d-item span { flex: 1; word-wrap: break-word; font-size: 15px; }
.d-item:hover{ background:var(--bg2); }

/* Result container - to control mobile order */
.calc-container { display: flex; flex-direction: column; }

.sel-item{ display:flex; justify-content:space-between; align-items:center; background:var(--surface2); padding:14px 18px; border-radius:10px; margin-bottom:10px; border:1px solid var(--border); flex-wrap: wrap; gap: 10px; }
.sel-item span { flex: 1; min-width: 200px; word-wrap: break-word; font-weight: 500; font-size: 15px; }
.sel-item .price-box { display: flex; align-items: center; gap: 12px; margin-left: auto; }

.rm-btn{ background:var(--rose-bg); color:var(--rose); border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:bold; font-size: 14px; }

.discount-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; padding-top: 20px; border-top: 1px dashed var(--border); }
.in-group { display: flex; flex-direction: column; gap: 5px; }
.in-group label { font-size: 12px; font-weight: 700; color: var(--ink3); text-transform: uppercase; }
.small-in { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; font-weight: bold; width: 100%; outline: none; }

.total-card{ background:var(--accent-gradient); color:#fff; padding:28px; border-radius:var(--radius); margin-top:20px; box-shadow: 0 15px 35px rgba(99, 102, 241, 0.25); }
.bill-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; opacity: 0.9; }
.bill-row.main { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); opacity: 1; font-weight: 800; font-size: 22px; }

.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(5px)} to{opacity:1; transform:translateY(0)} }

.footer { text-align: center; padding: 40px 20px; color: var(--ink3); font-size: 14px; border-top: 1px solid var(--border); background: #fff; margin-top: 40px; }
.footer a { color: var(--emerald); text-decoration: none; font-weight: 700; }

/* Responsive adjustments for phone view */
@media (max-width: 768px) {
  .topbar-brand { font-size: 18px; }
  .top-row { display: block; margin-bottom: 0; }
  .stat-pill, .tabs-wrapper { display: none !important; }
  .wrap { padding: 12px; }
  .card { padding: 15px; }
  
  /* REORDER FOR MOBILE: Search Top -> Total -> Discount -> List */
  .calc-container { display: flex; flex-direction: column; }
  .total-card { order: -2; margin-top: 0; margin-bottom: 20px; }
  #discount-area { order: -1; margin-bottom: 20px; padding-top: 0; border-top: none; }
  #sel-list { order: 1; }
  #clr-btn { order: 2; }
  
  .sel-item span { min-width: 100%; font-size: 14px; margin-bottom: 5px; }
  .sel-item .price-box { width: 100%; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 8px; }
  .d-item span { font-size: 14px; }
  .discount-box { grid-template-columns: 1fr; gap: 10px; border-top: 1px dashed var(--border); padding-top: 15px; }
  .bill-row.main { font-size: 19px; }

  #p-calc { display: block !important; }
  #p-manage { display: none !important; }
}
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-brand">🏥 Mahananda <span>Specialized Hospital</span></div>
</nav>

<div class="wrap">
  <div class="top-row">
    <div class="stat-pill">
      <div class="stat-icon">🧬</div>
      <div>
        <div class="stat-val" id="s-db">0</div>
        <div class="stat-lbl">Tests in DB</div>
      </div>
    </div>
    <div class="tabs-wrapper">
      <button class="tab-btn active" id="tb-calc" onclick="goTab('calc')">🧮 Calculator</button>
      <button class="tab-btn" id="tb-manage" onclick="goTab('manage')">⚙️ Manage Database</button>
    </div>
  </div>

  <div id="p-calc" class="tab-panel active">
    <!-- Search Bar card stays on top in both views -->
    <div class="card">
      <div class="srch-wrap">
        <span class="srch-icon-abs">🔍</span>
        <input class="srch-field" id="srch" type="text" placeholder="Type test name (e.g. CBC, Lipid, MRI...)" oninput="onSrch()">
        <div class="drop" id="drop"></div>
      </div>
    </div>

    <div class="card calc-container">
      
      <!-- Total Payable Card -->
      <div class="total-card" id="total-card" style="display:none">
        <div class="bill-row">
            <span>Subtotal (Tests):</span>
            <span id="res-sub">৳0</span>
        </div>
        <div class="bill-row">
            <span>Discount:</span>
            <span id="res-dis">- ৳0</span>
        </div>
        <div class="bill-row">
            <span id="vat-label">VAT (Fixed):</span>
            <span id="res-vat">+ ৳30</span>
        </div>
        <div class="bill-row main">
            <span>Net Payable:</span>
            <span id="res-total">৳0</span>
        </div>
      </div>

      <!-- Discount Inputs -->
      <div id="discount-area" style="display:none">
        <div class="discount-box">
            <div class="in-group">
                <label>Discount (%)</label>
                <input type="number" id="dis-p" class="small-in" placeholder="0%" oninput="calcByPerc()">
            </div>
            <div class="in-group">
                <label>Discount (Cash ৳)</label>
                <input type="number" id="dis-t" class="small-in" placeholder="0 ৳" oninput="calcByCash()">
            </div>
        </div>
      </div>

      <!-- Selected Test List -->
      <div id="sel-list"><p style="text-align:center; color:var(--ink4); padding:20px;">No tests selected. Use search above.</p></div>
      
      <!-- Clear Button -->
      <button class="tab-btn" id="clr-btn" style="display:none; margin-top:15px; width:100%; border:1px solid var(--border); background:var(--surface2); color:var(--rose)" onclick="clearSel()">🗑️ Clear All Selection</button>
    </div>
  </div>

  <div id="p-manage" class="tab-panel">
    <div class="card">
      <h3 style="margin-bottom:15px">Add New Test</h3>
      <div style="display:flex; gap:12px; flex-wrap: wrap;">
        <input class="srch-field" id="f-name" type="text" placeholder="Test Name" style="flex:2; min-width:200px">
        <input class="srch-field" id="f-price" type="number" placeholder="Price (৳)" style="flex:1; min-width:100px">
        <button class="tab-btn active" style="padding: 10px 20px" onclick="addTest()">Add Test</button>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-bottom:15px">Test Database</h3>
      <div id="db-list"></div>
    </div>
  </div>
</div>

<footer class="footer">
  <p>&copy; 2026 Test Calculator. <li> Developed by <a href="https://www.facebook.com/mdali.cn" target="_blank">Mohammad ali</a></li>  
     
  </p>
</footer>

<script>
let DB = [], SEL = [];
const SK = 'mahananda_db_v3';

function load(){
  const saved = localStorage.getItem(SK);
  if(saved) DB = JSON.parse(saved);
  else { 
    DB = SEED_DATA.map((x,i)=>({...x, id: Date.now()+i}));
    save(); 
  }
}
function save(){ localStorage.setItem(SK, JSON.stringify(DB)); }

function goTab(t){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('p-'+t).classList.add('active');
  document.getElementById('tb-'+t).classList.add('active');
  if(t==='manage') renderDb();
  refreshStats();
}

function onSrch(){
  const q = document.getElementById('srch').value.toLowerCase();
  const box = document.getElementById('drop');
  if(!q){ box.classList.remove('open'); return; }
  const matches = DB.filter(x => x.n.toLowerCase().includes(q)).slice(0, 30);
  if(matches.length){
    box.innerHTML = matches.map(m => `
      <div class="d-item" onclick="pick(${m.id})">
        <span>${m.n}</span>
        <strong>৳${m.p.toLocaleString()}</strong>
      </div>`).join('');
    box.classList.add('open');
  } else {
    box.innerHTML = `<div style="padding:15px; text-align:center; color:var(--ink4)">No tests found</div>`;
    box.classList.add('open');
  }
}

function pick(id){
  const t = DB.find(x => x.id === id);
  SEL.push({...t, sid: Date.now()});
  document.getElementById('srch').value = '';
  document.getElementById('drop').classList.remove('open');
  renderSel();
}

function renderSel(){
  const list = document.getElementById('sel-list');
  if(!SEL.length){
    list.innerHTML = `<p style="text-align:center; color:var(--ink4); padding:20px;">No tests selected. Use search above.</p>`;
    document.getElementById('total-card').style.display = 'none';
    document.getElementById('discount-area').style.display = 'none';
    document.getElementById('clr-btn').style.display = 'none';
    return;
  }

  list.innerHTML = SEL.map(s => `
    <div class="sel-item">
      <span>${s.n}</span>
      <div class="price-box">
        <strong style="color:var(--emerald)">৳${s.p.toLocaleString()}</strong>
        <button class="rm-btn" onclick="rmSel(${s.sid})">✕</button>
      </div>
    </div>`).join('');

  document.getElementById('total-card').style.display = 'block';
  document.getElementById('discount-area').style.display = 'block';
  document.getElementById('clr-btn').style.display = 'block';
  updateFinalMath();
}

function updateFinalMath() {
    const subtotal = SEL.reduce((a, b) => a + b.p, 0);
    const discCashInput = parseFloat(document.getElementById('dis-t').value) || 0;
    
    // Check if USG or ECG is present
    const hasUSG = SEL.some(item => item.n.toUpperCase().includes("USG"));
    const hasECG = SEL.some(item => item.n.toUpperCase().includes("ECG"));
    
    // Logic: 30 base + (if USG or ECG) add 10 once. Total 40.
    const currentVat = (hasUSG || hasECG) ? 40 : 30;
    const finalTotal = (subtotal - discCashInput) + currentVat;

    document.getElementById('res-sub').innerText = '৳' + subtotal.toLocaleString();
    document.getElementById('res-dis').innerText = '- ৳' + discCashInput.toLocaleString();
    document.getElementById('res-vat').innerText = '+ ৳' + currentVat;
    
    let vatLabel = "VAT (Fixed):";
    if (hasUSG && hasECG) vatLabel = "VAT (Base 30 + Special 10):";
    else if (hasUSG) vatLabel = "VAT (Base 30 + USG 10):";
    else if (hasECG) vatLabel = "VAT (Base 30 + ECG 10):";
    
    document.getElementById('vat-label').innerText = vatLabel;
    document.getElementById('res-total').innerText = '৳' + Math.max(0, finalTotal).toLocaleString();
}

function calcByPerc() {
    const subtotal = SEL.reduce((a, b) => a + b.p, 0);
    const perc = parseFloat(document.getElementById('dis-p').value) || 0;
    const cashValue = Math.round((subtotal * perc) / 100);
    document.getElementById('dis-t').value = cashValue;
    updateFinalMath();
}

function calcByCash() {
    const subtotal = SEL.reduce((a, b) => a + b.p, 0);
    const cash = parseFloat(document.getElementById('dis-t').value) || 0;
    const percValue = subtotal > 0 ? ((cash / subtotal) * 100).toFixed(1) : 0;
    document.getElementById('dis-p').value = percValue;
    updateFinalMath();
}

function rmSel(sid){ SEL = SEL.filter(x => x.sid !== sid); renderSel(); }
function clearSel(){ 
    SEL = []; 
    document.getElementById('dis-p').value = '';
    document.getElementById('dis-t').value = '';
    renderSel(); 
}

function addTest(){
  const n = document.getElementById('f-name').value.trim();
  const p = parseInt(document.getElementById('f-price').value);
  if(n && p){
    DB.push({id: Date.now(), n, p});
    save(); renderDb(); refreshStats();
    document.getElementById('f-name').value = '';
    document.getElementById('f-price').value = '';
    alert('Test Added Successfully!');
  }
}

function renderDb(){
  document.getElementById('db-list').innerHTML = DB.map((t) => `
    <div class="d-item">
      <span>${t.n}</span>
      <div>
        <strong>৳${t.p.toLocaleString()}</strong>
        <button class="rm-btn" style="margin-left:10px" onclick="del(${t.id})">✕</button>
      </div>
    </div>`).join('');
}

function del(id){
  if(confirm('Delete this test?')){
    DB = DB.filter(x => x.id !== id);
    save(); renderDb(); refreshStats();
  }
}

function refreshStats(){ 
    const el = document.getElementById('s-db');
    if(el) el.innerText = DB.length; 
}
